<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Productivity Dashboard</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <!-- Header -->
        <div class="header">

            <h1>Student Productivity Dashboard</h1>

            <!-- Dark Mode Button -->
            <button id="darkModeBtn">
                🌙 Dark Mode
            </button>

        </div>

        <!-- Input Section -->
        <div class="input-section">

            <!-- Task Input -->
            <input type="text"
                   id="taskInput"
                   placeholder="Enter your task">

            <!-- Due Date -->
            <input type="date"
                   id="dueDateInput">

            <!-- Add Task Button -->
            <button onclick="addTask()">
                Add Task
            </button>

        </div>

        <!-- Error Message -->
        <p id="errorMessage"></p>

        <!-- Filter Buttons -->
        <div class="filters">

            <button onclick="filterTasks('all')">
                All
            </button>

            <button onclick="filterTasks('completed')">
                Completed
            </button>

            <button onclick="filterTasks('pending')">
                Pending
            </button>

        </div>

        <!-- Statistics Box -->
        <div class="stats-box">

            <h3 id="stats">
                No tasks added yet
            </h3>

        </div>

        <!-- Task List -->
        <ul id="taskList"></ul>

    </div>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>

</html>
